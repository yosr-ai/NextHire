{% extends "base.html" %}

{% block content %}
<!-- ===================== PAGE D'INSCRIPTION (SPRINT 1) ===================== -->
<div class="auth-wrapper">
    <div class="auth-card" style="max-width: 540px;">
        <div style="text-align:center; margin-bottom:2rem;">
            <div style="font-size:3rem; margin-bottom:1rem;">👤</div>
            <h2>Créer un compte</h2>
            <p class="subtitle">Rejoignez la plateforme NextHire</p>
        </div>

        <!--
            action="{{ url_for('inscription') }}" → envoie les données à la route /register
            method="POST" → envoi sécurisé (les données n'apparaissent pas dans l'URL)
        -->
        <form method="POST" action="{{ url_for('inscription') }}">

            <!-- Nom d'utilisateur -->
            <div class="form-group">
                <label class="form-control-label" for="username">Nom d'utilisateur</label>
                <!--
                    name="username" → Flask lira request.form['username']
                    required → le champ est obligatoire (validation HTML)
                -->
                <input type="text" name="username" id="username" class="form-control"
                       placeholder="Ex : alice_dupont" required
                       minlength="3" maxlength="50">
            </div>

            <!-- Email -->
            <div class="form-group">
                <label class="form-control-label" for="email">Adresse Email</label>
                <input type="email" name="email" id="email" class="form-control"
                       placeholder="alice@email.com" required>
            </div>

            <!-- Téléphone (optionnel) -->
            <div class="form-group">
                <label class="form-control-label" for="telephone">Téléphone (optionnel)</label>
                <input type="tel" name="telephone" id="telephone" class="form-control"
                       placeholder="Ex : 0612345678">
            </div>

            <!-- Mot de passe -->
            <div class="form-group">
                <label class="form-control-label" for="password">Mot de passe</label>
                <input type="password" name="password" id="password" class="form-control"
                       placeholder="Minimum 6 caractères" required minlength="6">
            </div>

            <!-- Confirmation du mot de passe -->
            <div class="form-group">
                <label class="form-control-label" for="confirm_password">Confirmer le mot de passe</label>
                <input type="password" name="confirm_password" id="confirm_password" class="form-control"
                       placeholder="Répétez votre mot de passe" required minlength="6">
            </div>

            <button type="submit" class="btn btn-primary btn-block">Créer mon compte</button>
        </form>

        <div class="auth-footer">
            <p>Déjà un compte ? <a href="{{ url_for('connexion') }}">Se connecter</a></p>
        </div>
    </div>
</div>
{% endblock %}
