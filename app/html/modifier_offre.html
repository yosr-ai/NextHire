{% extends "base.html" %}

{% block content %}
<!-- ===================== FORMULAIRE MODIFIER UNE OFFRE (SPRINT 2) ===================== -->
<div class="auth-wrapper">
    <div class="auth-card" style="max-width:620px;">
        <div style="text-align:center; margin-bottom:2rem;">
            <div style="font-size:3rem; margin-bottom:1rem;">✏️</div>
            <h2>Modifier l'offre</h2>
            <p class="subtitle">{{ offre.titre }}</p>
        </div>

        <!--
            url_for('modifier_offre', offre_id=offre.id) génère l'URL dynamique
            Ex : /modifier_offre/3  pour l'offre avec id=3
        -->
        <form method="POST" action="{{ url_for('modifier_offre', offre_id=offre.id) }}">

            <div class="form-group">
                <label class="form-control-label" for="titre">Titre du poste *</label>
                <!--
                    value="{{ offre.titre }}" = pré-remplit le champ avec la valeur actuelle
                    C'est pratique pour les formulaires de modification !
                -->
                <input type="text" name="titre" id="titre" class="form-control"
                       value="{{ offre.titre }}" required>
            </div>

            <div class="form-group">
                <label class="form-control-label" for="description">Description *</label>
                <textarea name="description" id="description" rows="6" class="form-control" required>{{ offre.description }}</textarea>
            </div>

            <div class="form-group">
                <label class="form-control-label" for="localisation">Localisation</label>
                <input type="text" name="localisation" id="localisation" class="form-control"
                       value="{{ offre.localisation or '' }}">
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                <div class="form-group">
                    <label class="form-control-label" for="type_contrat">Type de contrat</label>
                    <select name="type_contrat" id="type_contrat" class="form-control form-select">
                        <option value="">-- Choisir --</option>
                        {% for c in ['CDI','CDD','Stage','Alternance','Freelance'] %}
                            <!--
                                selected = coché si la valeur actuelle correspond
                                C'est la façon dont on "pré-sélectionne" dans un <select>
                            -->
                            <option value="{{ c }}" {% if offre.type_contrat == c %}selected{% endif %}>{{ c }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-control-label" for="salaire">Salaire</label>
                    <input type="text" name="salaire" id="salaire" class="form-control"
                           value="{{ offre.salaire or '' }}">
                </div>
            </div>

            <!-- Statut de l'offre (Ouverte / Fermée) -->
            <div class="form-group">
                <label class="form-control-label" for="statut">Statut de l'offre</label>
                <select name="statut" id="statut" class="form-control form-select">
                    <option value="Ouverte"  {% if offre.statut == 'Ouverte'  %}selected{% endif %}>🟢 Ouverte</option>
                    <option value="Fermée"   {% if offre.statut == 'Fermée'   %}selected{% endif %}>🔴 Fermée</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary btn-block">💾 Sauvegarder les modifications</button>
            <a href="{{ url_for('tableau_de_bord') }}" class="btn btn-outline btn-block" style="margin-top:1rem;">
                Annuler
            </a>
        </form>
    </div>
</div>
{% endblock %}
